<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">

        <div class="todo-card">

            <!-- Heading -->
            <div class="text-center mb-4">
                <h1><i class="fa-solid fa-list-check"></i> My To-Do List</h1>
                <p class="text-muted">Stay organized and productive</p>
            </div>

            <!-- Input Section -->
            <div class="row g-2 mb-3">

                <div class="col-md-8">
                    <input type="text"
                        id="taskInput"
                        class="form-control"
                        placeholder="Enter a new task">
                </div>

                <div class="col-md-4 d-grid">
                    <button class="btn btn-primary" id="addBtn">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>
                </div>

            </div>

            <!-- Search Box -->
            <div class="mb-3">
                <input type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search tasks...">
            </div>

            <!-- Filter Buttons -->
            <div class="d-flex justify-content-center gap-2 mb-3">

                <button class="btn btn-outline-primary active filter-btn"
                    data-filter="all">
                    All
                </button>

                <button class="btn btn-outline-success filter-btn"
                    data-filter="completed">
                    Completed
                </button>

                <button class="btn btn-outline-warning filter-btn"
                    data-filter="pending">
                    Pending
                </button>

            </div>

            <!-- Task Counter -->
            <div class="task-info mb-3">

                <span>Total:
                    <strong id="totalTasks">0</strong>
                </span>

                <span>Completed:
                    <strong id="completedTasks">0</strong>
                </span>

                <span>Pending:
                    <strong id="pendingTasks">0</strong>
                </span>

            </div>

            <!-- Task List -->
            <ul class="list-group" id="taskList">
                <!-- Tasks will appear here -->
            </ul>

            <!-- Empty Message -->
            <div id="emptyMessage" class="text-center mt-4">
                <i class="fa-regular fa-face-smile fa-3x mb-3"></i>
                <p>No tasks yet. Add your first task!</p>
            </div>

            <!-- Footer Buttons -->
            <div class="d-flex justify-content-between mt-4">

                <button class="btn btn-danger" id="clearAllBtn">
                    <i class="fa-solid fa-trash"></i>
                    Clear All
                </button>

                <button class="btn btn-dark" id="themeBtn">
                    <i class="fa-solid fa-moon"></i>
                    Dark Mode
                </button>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>

</body>

</html>
